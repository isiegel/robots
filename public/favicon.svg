  <rect x="12" y="23" width="8" height="5" rx="1" fill="#1a5276"/>
  <circle cx="14" cy="25.5" r="1" fill="#e74c3c"/>
  <circle cx="18" cy="25.5" r="1" fill="#2ecc71"/>
  <!-- Arms -->
  <rect x="3" y="21" width="5" height="7" rx="2" fill="#3498db"/>
  <rect x="24" y="21" width="5" height="7" rx="2" fill="#3498db"/>
  <!-- Legs -->
  <rect x="10" y="30" width="5" height="2" rx="1" fill="#2471a3"/>
  <rect x="17" y="30" width="5" height="2" rx="1" fill="#2471a3"/>
</svg>
