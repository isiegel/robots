<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Antenna -->
  <line x1="16" y1="2" x2="16" y2="7" stroke="#555" stroke-width="1.5"/>
  <circle cx="16" cy="1.5" r="1.5" fill="#e74c3c"/>
  <!-- Head -->
  <rect x="7" y="7" width="18" height="13" rx="3" fill="#3498db"/>
  <!-- Eyes -->
  <rect x="10" y="11" width="4" height="3" rx="1" fill="#ecf0f1"/>
  <rect x="18" y="11" width="4" height="3" rx="1" fill="#ecf0f1"/>
  <rect x="11" y="11.5" width="2" height="2" rx="0.5" fill="#2980b9"/>
  <rect x="19" y="11.5" width="2" height="2" rx="0.5" fill="#2980b9"/>
  <!-- Mouth -->
  <rect x="11" y="16" width="10" height="2" rx="1" fill="#ecf0f1"/>
  <rect x="13" y="16" width="1.5" height="2" fill="#bdc3c7"/>
  <rect x="16" y="16" width="1.5" height="2" fill="#bdc3c7"/>
  <!-- Body -->
  <rect x="9" y="21" width="14" height="9" rx="2" fill="#2980b9"/>
